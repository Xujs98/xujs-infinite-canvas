services:
  app:
    image: qq1371446705/julong-canvas:${IMAGE_TAG:-latest}
    container_name: julong-canvas
    pull_policy: always
    env_file:
      - .env
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?请在 .env 中设置 ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      DATABASE_DSN: ${DATABASE_DSN:-/app/data/infinite-canvas.db}
    volumes:
      - ./data:/app/data
    ports:
      - "${APP_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/system-settings').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    stop_grace_period: 20s
    restart: unless-stopped
